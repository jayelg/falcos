---
# HalFrgrd/flyline publishes an official sha256 sidecar per release asset,
# so FLYLINE_SHA256 starts accurate when a human pins it. Renovate can bump
# FLYLINE_VERSION but can't recompute the checksum; this workflow does that
# follow-up: on PRs touching the versions file it fetches the pinned
# version's .sha256 sidecar (no need to pull the multi-MB tarball) and, if
# it differs from FLYLINE_SHA256, pushes a fixup commit to the PR branch.
# Same pattern as bw-checksum.yml, including the explicit re-dispatch since
# GITHUB_TOKEN pushes don't trigger pull_request workflows.
name: Flyline checksum

on:
  pull_request:
    paths:
      - 'build_files/versions-frequent-tools.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  update-checksum:
    # Fork branches can't be pushed to; Renovate PRs are same-repo
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Recompute FLYLINE_SHA256 and push fixup if stale
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          file=build_files/versions-frequent-tools.sh

          version="$(sed -n 's/^FLYLINE_VERSION="\([^"]*\)"/\1/p' "$file")"
          pinned="$(sed -n 's/^FLYLINE_SHA256="\([^"]*\)"/\1/p' "$file")"
          [ -n "$version" ] && [ -n "$pinned" ]

          asset="libflyline-v${version}-x86_64-unknown-linux-gnu.tar.gz"
          actual="$(curl -fsSL --retry 3 \
            "https://github.com/HalFrgrd/flyline/releases/download/v${version}/${asset}.sha256" \
            | cut -d' ' -f1)"

          if [ "$actual" = "$pinned" ]; then
            echo "FLYLINE_SHA256 already matches flyline ${version}, nothing to do."
            exit 0
          fi

          sed -i "s/^FLYLINE_SHA256=.*/FLYLINE_SHA256=\"${actual}\"/" "$file"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "update FLYLINE_SHA256 for flyline ${version}"
          git push origin "HEAD:${BRANCH}"

          # Re-validate the branch on the fixup commit
          gh workflow run build.yml --ref "$BRANCH"
          gh workflow run lint.yml --ref "$BRANCH"
