---
name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    # 12:30 UTC daily: after the fedora-bootc:44 push (~11:30 UTC, with
    # margin for drift), so the cache written here is built on today's base
    # and stays valid for pushes/PRs until tomorrow's base lands.
    - cron: '30 12 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - '.github/workflows/cleanup-registry.yml'
  workflow_dispatch:
    inputs:
      kernel:
        description: >-
          Override the Containerfile KERNEL arg (cachyos or stock; empty
          uses the repo default). stock builds validate the fallback
          kernel path and are never pushed, signed, or cached.
        type: string
        default: ''

env:
  IMAGE_DESC: "Custom Fedora bootc KDE Plasma image"
  IMAGE_KEYWORDS: "bootc,fedora,kde-plasma"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/99842644?v=4"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit

jobs:
  # PR builds only prove the change still builds, one flavor is enough.
  # A separate job because the matrix context isn't available in a
  # job-level if.
  #
  # Renovate automerges are already validated by their PR build and are
  # skipped here; the daily scheduled build picks them up together with
  # upstream drift (see .github/renovate.json5).
  compute-matrix:
    if: github.event_name != 'push' || github.actor != 'renovate[bot]'
    runs-on: ubuntu-24.04
    outputs:
      flavors: ${{ steps.set.outputs.flavors }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'flavors=["laptop"]' >> "$GITHUB_OUTPUT"
          else
            echo 'flavors=["desktop","laptop"]' >> "$GITHUB_OUTPUT"
          fi

  build_push:
    needs: compute-matrix
    name: Build and push image (${{ matrix.flavor }})
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        flavor: ${{ fromJson(needs.compute-matrix.outputs.flavors) }}
      fail-fast: false

    concurrency:
      # event_name included so a push doesn't cancel the daily schedule run
      # (same ref) — that run exists specifically to refresh the cache.
      group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref || github.run_id }}-${{ matrix.flavor }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: write

    steps:
      # Separate image per flavor so tag history is independent and
      # bootc switch targets are unambiguous
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_NAME=falcos-${{ matrix.flavor }}" >> "${GITHUB_ENV}"
          # Publish gate for the export/rechunk/push/sign steps below
          if [ "${{ github.event_name }}" != "pull_request" ] \
             && [ "${{ github.ref }}" = "refs/heads/${{ github.event.repository.default_branch }}" ] \
             && [ "${{ github.event.inputs.kernel }}" != "stock" ]; then
            echo "PUBLISH=true" >> "${GITHUB_ENV}"
          else
            echo "PUBLISH=false" >> "${GITHUB_ENV}"
          fi

      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          # Single value for the version tag, OCI label and IMAGE_VERSION
          # build-arg so they can't disagree across a midnight boundary
          echo "version=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Image Metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: metadata
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.date.outputs.version }}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }} (${{ matrix.flavor }})
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ steps.date.outputs.version }}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1

      # Optional Secure Boot signing key; only written on pushes to the
      # default branch, same gate as the cosign steps below.
      - name: Write MOK signing key
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          umask 077
          printf '%s' "$MOK_PRIVATE_KEY" > "${RUNNER_TEMP}/mok_privkey.pem"
        env:
          MOK_PRIVATE_KEY: ${{ secrets.MOK_PRIVATE_KEY }}

      # BuildKit content-addresses each RUN --mount by the mounted path,
      # which the Containerfile's narrow per-group mounts rely on for
      # caching. Buildah keys on the whole ctx stage and never cache-hits.
      - name: Setup Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Registry layer cache, gated by event so caching doesn't mask
      # upstream drift in unpinned packages:
      #   schedule: write-only, exists to catch drift and refresh the cache
      #   push/workflow_dispatch on main: read and write
      #   pull_request: read-only, anonymous (public package)
      # Per-flavor cache tags since a buildx cache export is one manifest
      # per ref and the matrix jobs would clobber a shared tag. Each flavor
      # reads both tags, the sibling still serves the flavor-agnostic prefix.
      - name: Determine build cache args
        id: cache-args
        run: |
          cache_repo="${{ env.IMAGE_REGISTRY }}/falcos-cache"
          sibling="$([ "${{ matrix.flavor }}" = "laptop" ] && echo desktop || echo laptop)"
          {
            echo 'cache-from<<EOF'
            if [ "${{ github.event_name }}" != "schedule" ]; then
              echo "type=registry,ref=${cache_repo}:${{ matrix.flavor }}"
              echo "type=registry,ref=${cache_repo}:${sibling}"
            fi
            echo 'EOF'
            echo 'cache-to<<EOF'
            # stock-kernel validation builds must not clobber the cache
            # the daily cachyos builds rely on
            if [ "${{ github.event.inputs.kernel }}" != "stock" ] && { [ "${{ github.event_name }}" = "schedule" ] || { [ "${{ github.event_name }}" != "pull_request" ] && [ "${{ github.ref }}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; }; }; then
              echo "type=registry,ref=${cache_repo}:${{ matrix.flavor }},mode=max"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # Runner-user login, used by the buildx cache-to registry writes
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: env.PUBLISH == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # provenance: false keeps the output a single image manifest rather
      # than an attestation index, the shape bootc and cosign expect.
      # Publishing builds export an OCI archive rather than pushing; the
      # chunked repack below is what gets published.
      - name: Build Image
        id: build_image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Containerfile
          outputs: ${{ env.PUBLISH == 'true' && format('type=oci,dest={0}/raw-oci.tar', runner.temp) || '' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            FLAVOR=${{ matrix.flavor }}
            IMAGE_VERSION=${{ steps.date.outputs.version }}
            ${{ github.event.inputs.kernel && format('KERNEL={0}', github.event.inputs.kernel) || '' }}
          provenance: false
          cache-from: ${{ steps.cache-args.outputs.cache-from }}
          cache-to: ${{ steps.cache-args.outputs.cache-to }}
          secret-files: |
            ${{ (github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
                && format('mok_privkey={0}/mok_privkey.pem', runner.temp) || '' }}

      # Scans the raw archive rather than the chunked image: same
      # filesystem (chunking only repartitions layers), but readable
      # without root and no second multi-GB rootfs copy.
      - name: Setup Syft
        id: setup-syft
        if: env.PUBLISH == 'true'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM
        if: env.PUBLISH == 'true'
        env:
          SYFT_CMD: ${{ steps.setup-syft.outputs.cmd }}
        run: |
          # Kernel modules and firmware are RPM-owned files, so excluding
          # them leaves the package inventory intact while keeping the scan
          # within the runner's memory; nproc parallelism for the same
          # reason.
          export SYFT_PARALLELISM=$(nproc)
          "$SYFT_CMD" scan "oci-archive:${RUNNER_TEMP}/raw-oci.tar" \
            --source-name "${IMAGE_NAME}" \
            --exclude '/usr/lib/modules/**' \
            --exclude '/usr/lib/firmware/**' \
            -o "spdx-json=${RUNNER_TEMP}/sbom.spdx.json"
          du -sh "${RUNNER_TEMP}/sbom.spdx.json"

      # build-chunked-oci reads from root containers-storage. :latest
      # selects one image — the buildx export indexes one entry per tag.
      - name: Import image into containers-storage
        if: env.PUBLISH == 'true'
        run: |
          sudo skopeo copy "oci-archive:${RUNNER_TEMP}/raw-oci.tar:latest" \
            "containers-storage:localhost/${IMAGE_NAME}:raw"
          rm -f "${RUNNER_TEMP}/raw-oci.tar"

      # Repack into content-stable chunks (one layer per package group) so
      # bootc upgrade only downloads what changed. rpm-ostree runs from the
      # image itself so the chunker matches the ostree stack it operates
      # on; rootless is blocked upstream (coreos/rpm-ostree#5346).
      - name: Rechunk image
        if: env.PUBLISH == 'true'
        run: |
          sudo podman run --rm --privileged \
            --volume /var/lib/containers:/var/lib/containers \
            "localhost/${IMAGE_NAME}:raw" \
            rpm-ostree compose build-chunked-oci \
            --bootc --max-layers 127 --format-version=2 \
            --from "localhost/${IMAGE_NAME}:raw" \
            --output "containers-storage:localhost/${IMAGE_NAME}:chunked"
          sudo podman rmi "localhost/${IMAGE_NAME}:raw"

      # The docker login above only covers the runner user; the sudo
      # skopeo push needs root credentials.
      - name: Login to GitHub Container Registry (root)
        if: env.PUBLISH == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Tags after the first are registry-side copies of its digest, so
      # every tag shares one manifest for cosign to cover.
      - name: Push chunked image
        id: push
        if: env.PUBLISH == 'true'
        run: |
          digest=""
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            if [ -z "$digest" ]; then
              sudo skopeo copy --retry-times 3 \
                "containers-storage:localhost/${IMAGE_NAME}:chunked" \
                "docker://${tag}" --digestfile "${RUNNER_TEMP}/digestfile"
              digest="$(cat "${RUNNER_TEMP}/digestfile")"
            else
              sudo skopeo copy --retry-times 3 \
                "docker://${IMAGE_REGISTRY}/${IMAGE_NAME}@${digest}" \
                "docker://${tag}"
            fi
          done <<< "${{ steps.metadata.outputs.tags }}"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: env.PUBLISH == 'true'
        with:
          cosign-release: 'v2.6.3'

      - name: Sign container image
        if: env.PUBLISH == 'true'
        run: |
          # Sign by digest, covers every tag and avoids racing a moving tag
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          cosign sign -y --key env://COSIGN_PRIVATE_KEY \
            "${IMAGE_FULL}@${{ steps.push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      # No Rekor upload: the public tlog rejects multi-MB SBOM envelopes
      # and verification is key-based against the baked-in cosign.pub, so
      # verify with --insecure-ignore-tlog=true.
      - name: Attest SBOM
        if: env.PUBLISH == 'true'
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          # default 3m timeout covers the whole multi-MB blob upload and
          # has been hit on slow ghcr days
          cosign attest --key env://COSIGN_PRIVATE_KEY \
            --tlog-upload=false --timeout=10m \
            --type spdxjson --predicate "${RUNNER_TEMP}/sbom.spdx.json" \
            "${IMAGE_FULL}@${{ steps.push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      # Old versions are pruned daily by cleanup-registry.yml, which keeps
      # the newest tagged builds and their cosign signatures/attestations.
