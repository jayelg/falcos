---
name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC everyday — also picks up upstream fedora-bootc updates
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

env:
  IMAGE_DESC: "Custom Fedora bootc KDE Plasma image"
  IMAGE_KEYWORDS: "bootc,fedora,kde-plasma"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/99842644?v=4"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit

jobs:
  # PR builds only need to prove the change still builds, not publish both
  # flavors — the full matrix already runs on every push to main and on the
  # daily schedule regardless, so skipping desktop here halves the
  # Actions-minutes cost of every PR (Renovate's included) without losing
  # real coverage. The `matrix` context isn't available in a job-level `if`,
  # so this has to be a separate job computing the matrix array itself.
  compute-matrix:
    runs-on: ubuntu-24.04
    outputs:
      flavors: ${{ steps.set.outputs.flavors }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'flavors=["laptop"]' >> "$GITHUB_OUTPUT"
          else
            echo 'flavors=["desktop","laptop"]' >> "$GITHUB_OUTPUT"
          fi

  build_push:
    needs: compute-matrix
    name: Build and push image (${{ matrix.flavor }})
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        flavor: ${{ fromJson(needs.compute-matrix.outputs.flavors) }}
      fail-fast: false

    concurrency:
      # event_name included so a push doesn't cancel the daily schedule run
      # (same ref) — that run exists specifically to refresh the cache.
      group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref || github.run_id }}-${{ matrix.flavor }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # Separate image per flavor (falcos-laptop, falcos-desktop) rather than
      # one image with flavor-named tags, so each flavor's tag history/pruning
      # is independent and `bootc switch` targets are unambiguous.
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=falcos-${{ matrix.flavor }}" >> ${GITHUB_ENV}

      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: metadata
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }} (${{ matrix.flavor }})
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version={{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1

      # Optional Secure Boot signing key; only written on pushes to the
      # default branch, same gate as the cosign steps below.
      - name: Write MOK signing key
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          umask 077
          printf '%s' "$MOK_PRIVATE_KEY" > "${RUNNER_TEMP}/mok_privkey.pem"
        env:
          MOK_PRIVATE_KEY: ${{ secrets.MOK_PRIVATE_KEY }}

      # BuildKit (not buildah): its cache keys content-address each RUN
      # --mount by the mounted path itself, which is what the Containerfile's
      # narrow per-group mounts assume. Buildah keyed the cache on the whole
      # build_files context image, so any build_files change busted every
      # layer and the registry cache never produced a single hit.
      - name: Setup Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Registry-based layer cache, so a version bump in common/frequent
      # doesn't force a rebuild of the (expensive) common/core layer — but
      # gated by event, since aggressive caching would also mask upstream
      # drift in the many unpinned packages in both layers:
      #   - schedule: write-only. This run's whole purpose is catching
      #     upstream drift, so it never reads the cache, only refreshes it
      #     for the reads below.
      #   - push/workflow_dispatch (on the default branch): read + write.
      #     Needs login (below) since cache-to pushes during the build.
      #   - pull_request: read-only. No registry login is ever granted to
      #     PR builds, so this relies on the cache image being pullable
      #     anonymously (public package visibility on ghcr.io).
      #
      # Per-flavor cache tags: a buildx cache export is one manifest per ref,
      # so both matrix jobs writing a single shared tag would clobber each
      # other. Each flavor writes its own tag but reads both — the sibling's
      # cache still serves the flavor-agnostic prefix (phase-setup/core/
      # frequent). mode=max exports every layer, not just the final image's.
      - name: Determine build cache args
        id: cache-args
        run: |
          cache_repo="${{ env.IMAGE_REGISTRY }}/falcos-cache"
          sibling="$([ "${{ matrix.flavor }}" = "laptop" ] && echo desktop || echo laptop)"
          {
            echo 'cache-from<<EOF'
            if [ "${{ github.event_name }}" != "schedule" ]; then
              echo "type=registry,ref=${cache_repo}:${{ matrix.flavor }}"
              echo "type=registry,ref=${cache_repo}:${sibling}"
            fi
            echo 'EOF'
            echo 'cache-to<<EOF'
            if [ "${{ github.event_name }}" = "schedule" ] || { [ "${{ github.event_name }}" != "pull_request" ] && [ "${{ github.ref }}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; }; then
              echo "type=registry,ref=${cache_repo}:${{ matrix.flavor }},mode=max"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds and (on the default branch) pushes in one step — BuildKit
      # pushes at export time, so there is no separate push step to keep in
      # sync. provenance: false keeps the output a single image manifest
      # rather than an attestation-bearing index, so the pushed digest stays
      # the same shape bootc switch/upgrade and cosign sign against today.
      - name: Build Image
        id: build_image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Containerfile
          push: ${{ github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            FLAVOR=${{ matrix.flavor }}
          provenance: false
          cache-from: ${{ steps.cache-args.outputs.cache-from }}
          cache-to: ${{ steps.cache-args.outputs.cache-to }}
          secret-files: |
            ${{ (github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
                && format('mok_privkey={0}/mok_privkey.pem', runner.temp) || '' }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          cosign-release: 'v2.6.3'

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          # Sign by digest, not tag — covers every tag on this manifest and
          # avoids a race with a mutable tag moving mid-build.
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          cosign sign -y --key env://COSIGN_PRIVATE_KEY \
            "${IMAGE_FULL}@${{ steps.build_image.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

      # Pruning removed: actions/delete-package-versions's ignore-versions
      # regex was unreliable for a package shared between two flavors plus
      # cosign .sig tags (upstream: actions/delete-package-versions#120),
      # and it deleted every "desktop" tag outright on its first run here,
      # breaking bootc upgrade for anyone on that flavor. Now that each
      # flavor is its own package (falcos-laptop / falcos-desktop), that
      # specific failure mode is moot, but pruning still needs a look before
      # re-enabling since cosign .sig tags remain mixed in with real ones.
