---
# Several release assets are pinned with a SHA256 next to their version pin
# in the versions-*.sh files (trust-on-first-use at PR time, which also
# catches a release asset being swapped after the pin). Renovate can bump
# the version pins but can't recompute checksums; this workflow does that
# follow-up for every pinned asset in one pass: on PRs touching a versions
# file it recomputes each stale checksum and pushes a single fixup commit
# to the PR branch. One workflow rather than one per asset so concurrent
# fixup pushes to the same branch can't race each other.
#
# The fixup push uses GITHUB_TOKEN, which never triggers the pull_request
# workflows on the new commit, so validation runs are dispatched explicitly
# (same pattern as kernel-freshness.yml).
name: Checksums

on:
  pull_request:
    paths:
      - 'build_files/components/pinned-cli-tools/versions.sh'
      - 'build_files/components/affinity/versions.sh'
      - 'build_files/components/falcos-bootc-updates/versions.sh'
      - 'build_files/versions-core-theming.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  update-checksums:
    # Fork branches can't be pushed to; Renovate PRs are same-repo
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Recompute stale checksums and push fixup
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          # name|versions file|version var|sha var|mode|asset URL ({v} = version)
          # mode "download" hashes the asset itself; "sidecar" fetches an
          # upstream-published .sha256 next to it (URL points at the sidecar).
          entries=(
            'bw|build_files/components/pinned-cli-tools/versions.sh|BW_VERSION|BW_SHA256|download|https://github.com/bitwarden/clients/releases/download/cli-v{v}/bw-linux-{v}.zip'
            'aichat|build_files/components/pinned-cli-tools/versions.sh|AICHAT_VERSION|AICHAT_SHA256|download|https://github.com/sigoden/aichat/releases/download/v{v}/aichat-v{v}-x86_64-unknown-linux-musl.tar.gz'
            'starship|build_files/components/pinned-cli-tools/versions.sh|STARSHIP_VERSION|STARSHIP_SHA256|sidecar|https://github.com/starship/starship/releases/download/v{v}/starship-x86_64-unknown-linux-musl.tar.gz.sha256'
            # nerd-fonts pins the release's SHA-256.txt manifest, the build
            # verifies each font archive against it
            'nerd-fonts|build_files/components/pinned-cli-tools/versions.sh|NERD_FONTS_VERSION|NERD_FONTS_SHA256|download|https://github.com/ryanoasis/nerd-fonts/releases/download/v{v}/SHA-256.txt'
            'darkly|build_files/versions-core-theming.sh|DARKLY_VERSION|DARKLY_SHA256|download|https://github.com/Bali10050/Darkly/archive/refs/tags/v{v}.tar.gz'
            'ant|build_files/versions-core-theming.sh|ANT_COMMIT|ANT_SHA256|download|https://github.com/EliverLara/Ant/archive/{v}.tar.gz'
            'advanced-weather-widget|build_files/versions-core-theming.sh|AWW_VERSION|AWW_SHA256|download|https://github.com/pnedyalkov91/advanced-weather-widget/releases/download/{v}/advanced-weather-widget.plasmoid'
            'flyline|build_files/components/pinned-cli-tools/versions.sh|FLYLINE_VERSION|FLYLINE_SHA256|sidecar|https://github.com/HalFrgrd/flyline/releases/download/v{v}/libflyline-v{v}-x86_64-unknown-linux-gnu.tar.gz.sha256'
            'falcos-cli|build_files/components/pinned-cli-tools/versions.sh|FALCOS_CLI_VERSION|FALCOS_CLI_SHA256|sidecar|https://github.com/jayelg/falcos-cli/releases/download/v{v}/falcos-cli-v{v}-x86_64-linux-gnu.tar.gz.sha256'
            'wine-affinity|build_files/components/affinity/versions.sh|AFFINITY_WINE_TAG|AFFINITY_WINE_SHA256|download|https://github.com/ryzendew/Affinity-Wine-Builder/releases/download/{v}/ElementalWarrior-wine-{v}.tar.xz'
            'dxvk|build_files/components/affinity/versions.sh|DXVK_VERSION|DXVK_SHA256|download|https://github.com/doitsujin/dxvk/releases/download/v{v}/dxvk-{v}.tar.gz'
            'vkd3d-proton|build_files/components/affinity/versions.sh|VKD3D_PROTON_VERSION|VKD3D_PROTON_SHA256|download|https://github.com/HansKristian-Work/vkd3d-proton/releases/download/v{v}/vkd3d-proton-{v}.tar.zst'
            'falcos-bootc-updates|build_files/components/falcos-bootc-updates/versions.sh|FALCOS_BOOTC_UPDATES_VERSION|FALCOS_BOOTC_UPDATES_SHA256|download|https://github.com/jayelg/falcos-bootc-updates/releases/download/v{v}/falcos-bootc-updates-{v}-1.fc44.x86_64.rpm'
          )
          # plasma-network-audio (same file) is deliberately absent: its
          # asset filename doesn't derive from the tag, bumps are manual.

          fixed=()
          for entry in "${entries[@]}"; do
            IFS='|' read -r name file version_var sha_var mode url <<< "$entry"

            version="$(sed -n "s/^${version_var}=\"\([^\"]*\)\"/\1/p" "$file")"
            pinned="$(sed -n "s/^${sha_var}=\"\([^\"]*\)\"/\1/p" "$file")"
            # Not `[ -n .. ] && [ -n .. ]`: set -e exempts non-final commands
            # of a && list, so that form never aborts on an empty $version
            if [ -z "$version" ] || [ -z "$pinned" ]; then
              echo "::error::${name}: ${version_var} or ${sha_var} not found in ${file}"
              exit 1
            fi
            url="${url//\{v\}/${version}}"

            if [ "$mode" = "sidecar" ]; then
              actual="$(curl -fsSL --retry 3 "$url" | cut -d' ' -f1)"
            else
              curl -fsSL --retry 3 "$url" -o "${RUNNER_TEMP}/asset"
              actual="$(sha256sum "${RUNNER_TEMP}/asset" | cut -d' ' -f1)"
              rm -f "${RUNNER_TEMP}/asset"
            fi

            if [ "$actual" = "$pinned" ]; then
              echo "${sha_var} already matches ${name} ${version}, nothing to do."
              continue
            fi

            sed -i "s/^${sha_var}=.*/${sha_var}=\"${actual}\"/" "$file"
            fixed+=("${name} ${version}")
            echo "${sha_var} updated for ${name} ${version}."
          done

          [ "${#fixed[@]}" -gt 0 ] || exit 0

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "update checksums: $(IFS=', '; echo "${fixed[*]}")"
          git push origin "HEAD:${BRANCH}"

          # Re-validate the branch on the fixup commit
          gh workflow run build.yml --ref "$BRANCH"
          gh workflow run lint.yml --ref "$BRANCH"
