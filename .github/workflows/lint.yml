---
name: Lint and test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # -s bash because the component scripts and versions files are sourced
      # fragments without shebangs. Extensionless runtime scripts (libexec,
      # systemd generators) are included explicitly. Repo-wide excludes
      # live in .shellcheckrc.
      - name: Run shellcheck
        run: |
          mapfile -t scripts < <(
            find build-phases scripts lib -name '*.sh' -type f
            find components -path '*/files/*' -type f \
              \( -path '*/libexec/*' -o -path '*/system-generators/*' \)
          )
          shellcheck -s bash "${scripts[@]}"

      # Catches list entries that don't resolve to a component directory
      # and skeleton marker damage, without needing a full image build.
      - name: Validate components.list against the component tree
        run: ./scripts/gen-containerfile.sh

  actionlint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12

  # Unit tests for kernel-freshness scripts discovered in component dirs
  script-tests:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Discover and run kernel-freshness tests
        run: |
          dirs=($(find components -name test_kernel_freshness.py -type f -exec dirname {} \; | sort -u))
          for d in "${dirs[@]}"; do
            echo "==> Running tests in ${d}..."
            python3 -m unittest discover -s "$d" -v
          done
