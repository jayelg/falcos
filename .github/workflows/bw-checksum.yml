---
# Bitwarden publishes no official checksum for the CLI zip, so the repo
# pins BW_SHA256 next to BW_VERSION (trust-on-first-use at PR time, which
# also catches a release asset being swapped after the pin). Renovate can
# bump BW_VERSION but can't recompute the checksum; this workflow does
# that follow-up: on PRs touching the versions file it downloads the
# pinned version's zip, and if the computed sha256 differs from BW_SHA256
# it pushes a fixup commit to the PR branch.
#
# The fixup push uses GITHUB_TOKEN, which never triggers the
# pull_request workflows on the new commit, so validation runs are
# dispatched explicitly (same pattern as kernel-freshness.yml).
name: Bitwarden CLI checksum

on:
  pull_request:
    paths:
      - 'build_files/versions-frequent-tools.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  update-checksum:
    # Fork branches can't be pushed to; Renovate PRs are same-repo
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Recompute BW_SHA256 and push fixup if stale
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          file=build_files/versions-frequent-tools.sh

          version="$(sed -n 's/^BW_VERSION="\([^"]*\)"/\1/p' "$file")"
          pinned="$(sed -n 's/^BW_SHA256="\([^"]*\)"/\1/p' "$file")"
          [ -n "$version" ] && [ -n "$pinned" ]

          curl -fsSL --retry 3 \
            "https://github.com/bitwarden/clients/releases/download/cli-v${version}/bw-linux-${version}.zip" \
            -o "${RUNNER_TEMP}/bw.zip"
          actual="$(sha256sum "${RUNNER_TEMP}/bw.zip" | cut -d' ' -f1)"

          if [ "$actual" = "$pinned" ]; then
            echo "BW_SHA256 already matches bw ${version}, nothing to do."
            exit 0
          fi

          sed -i "s/^BW_SHA256=.*/BW_SHA256=\"${actual}\"/" "$file"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "update BW_SHA256 for bw ${version}"
          git push origin "HEAD:${BRANCH}"

          # Re-validate the branch on the fixup commit
          gh workflow run build.yml --ref "$BRANCH"
          gh workflow run lint.yml --ref "$BRANCH"
