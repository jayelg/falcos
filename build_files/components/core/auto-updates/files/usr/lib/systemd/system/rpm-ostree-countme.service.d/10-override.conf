# Inert while rpm-ostree-countme.timer is masked (enable-services.sh).
# If the timer is unmasked, this makes the ping retry instead of leaving a
# failed unit when it runs before the network is up, e.g. right after
# resume from suspend.
[Unit]
Wants=network-online.target
After=network-online.target

[Service]
Restart=on-failure
RestartSec=5m
