# Force /etc/resolv.conf back to the systemd-resolved stub every boot.
# A previous image may have shipped dnsconfd, which leaves a static resolv.conf
# pointing at 127.0.0.1 and can break DNS for anything reading resolv.conf
# directly (containers, curl). L+ reasserts the stub symlink over any leftover file.
L+ /etc/resolv.conf - - - - ../run/systemd/resolve/stub-resolv.conf
